spring.application.name=shoppingCartBackend

# التعديل هنا: تأكد أن اسم القاعدة shoppingdb موجودة فعلاً في phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/shoppingdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.aop.proxy-target-class=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ملاحظة: Hibernate 6+ لا يحتاج تحديد الـ dialect يدوياً، سيتعرف عليه تلقائياً

## update = database schema is updated automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.isolation=2

api.prefix=/api/v1

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

## 1 hour
auth.token.expirationInMils=3600000
